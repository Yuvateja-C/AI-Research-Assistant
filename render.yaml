services:
  - type: web
    name: ai-research-assistant-api
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
    disk:
      name: chroma-data
      mountPath: /data
      sizeGB: 1
