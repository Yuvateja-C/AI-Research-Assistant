<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResearchAI — Intelligent Document Analysis</title>

    <!-- Core SEO Meta Tags -->
    <meta name="description" content="Upload any document and get instant AI-powered summaries, insights, and answers. ResearchAI makes intelligent document analysis fast, accurate, and simple." />
    <meta name="keywords" content="AI document analysis, PDF summarizer, intelligent document reader, AI document chat, research paper analyzer, document AI" />
    <meta name="author" content="ResearchAI" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://researchai-app.vercel.app/" />

    <!-- Open Graph / Facebook Previews -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://researchai-app.vercel.app/" />
    <meta property="og:title" content="ResearchAI — Intelligent Document Analysis" />
    <meta property="og:description" content="Analyze any document in seconds with AI. Upload PDFs, Word files, or text and extract key insights, summaries, and answers instantly." />
    <meta property="og:image" content="https://researchai-app.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ResearchAI — Upload a document, get instant AI insights" />
    <meta property="og:site_name" content="ResearchAI" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card Previews -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://researchai-app.vercel.app/" />
    <meta name="twitter:title" content="ResearchAI — Intelligent Document Analysis" />
    <meta name="twitter:description" content="Analyze any document in seconds with AI. Extract insights, summaries, and answers instantly." />
    <meta name="twitter:image" content="https://researchai-app.vercel.app/og-image.png" />
    <meta name="twitter:image:alt" content="ResearchAI document analysis interface" />

    <!-- Favicon and PWA -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0b0b10" />

    <!-- Performance Preconnect Hints -->
    <link rel="preconnect" href="https://api-research-assistant-bseo.onrender.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://researchai-app.vercel.app/#website",
          "url": "https://researchai-app.vercel.app/",
          "name": "ResearchAI",
          "description": "AI-powered intelligent document analysis platform",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://researchai-app.vercel.app/?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://researchai-app.vercel.app/#app",
          "name": "ResearchAI",
          "url": "https://researchai-app.vercel.app/",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web Browser",
          "description": "Upload any document and get instant AI-powered summaries, key insights, and intelligent answers. Supports PDF, Word, and plain text files.",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD",
            "description": "Free to use"
          },
          "featureList": [
            "AI-powered document summarization",
            "Intelligent key insight extraction",
            "Natural language Q&A over documents",
            "PDF and Word document support",
            "Instant analysis in seconds"
          ]
        },
        {
          "@type": "Organization",
          "@id": "https://researchai-app.vercel.app/#organization",
          "name": "ResearchAI",
          "url": "https://researchai-app.vercel.app/"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
